server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — заставляет nginx ПЕРЕ-резолвить IP контейнера `server`
    # после каждого редеплоя. Без этого nginx кешировал старый IP при старте, и
    # после пересоздания server'а /api отваливался (статика при этом работала).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA: все неизвестные пути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Server health (mediasoup status etc)
    location /health {
        set $backend server;
        proxy_pass         http://$backend:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # REST API → backend
    location /api/ {
        set $backend server;
        proxy_pass         http://$backend:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Socket.io + WebSocket upgrade → backend
    location /socket.io/ {
        set $backend server;
        proxy_pass         http://$backend:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }
}
