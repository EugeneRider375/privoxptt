server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: все неизвестные пути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Server health (mediasoup status etc)
    location /health {
        proxy_pass         http://server:3000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # REST API → backend
    location /api/ {
        proxy_pass         http://server:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Socket.io + WebSocket upgrade → backend
    location /socket.io/ {
        proxy_pass         http://server:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }
}
